{% extends "layout.html" %}

{% block title %}
    Quote
{% endblock %}

{% block main %}
    <table class="table table-striped">
        <tr>
            <th scope="col"><b>Symbol</b></th>
            <th scope="col"><b>Name</b></th>
            <th scope="col"><b>Price</b></th>
        </tr>
        <tr>
            <td>{{ symbol }}</td>
            <td>{{ name }}</td>
            <td>{{ price }}</td>
        </tr>
    </table>
{% endblock %}
