<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                <h3>What is the square root of 196?</h3>
                <button class="incorrect">12</button>
                <button class="correct">14</button>
                <button class="incorrect">16</button>

                <p id="message"></p>

                <script>
                    let correct = document.querySelector('.correct');
                    let incorrects = document.querySelectorAll('.incorrect');
                    let message = document.querySelector('#message');

                    correct.onclick = function() {
                        correct.style.backgroundColor = 'green';
                        message.innerHTML = 'Correct';
                    }

                    for (let x = 0; x < incorrects.length; x++) {
                        let incorrect = incorrects[x];
                        incorrect.onclick = function() {
                            incorrect.style.backgroundColor = 'red';
                            message.innerHTML = 'Incorrect';
                        }
                    }
                </script>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>What is the capital of UK?</h3>
                <form>
                    <input placeholder="Answer" type="text">
                    <button id="submit">Submit</button>
                    <p id="message2"></p>
                </form>

                <script>
                    document.querySelector('#submit').onclick = function() {
                        let input = document.querySelector('input');
                        let message = document.querySelector('#message2');

                        if (input.value == 'London' || input.value == 'london' || input.value == 'LONDON') {
                            input.style.backgroundColor = 'green';
                            message.innerHTML = 'Correct';
                        }
                        else {
                            input.style.backgroundColor = 'red';
                            message.innerHTML = 'Incorrect';
                        }
                    }
                </script>
            </div>
        </div>
    </body>
</html>
