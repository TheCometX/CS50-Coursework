<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            let incorrect = querySelectorAll('.incorrect');
            let correct = querySelector('.correct');
            let message = querySelector('#message');

            correct.onclick = function () {
                correct.style.backgroundColor = 'red';
                message.innerHTML = 'Correct';
            }

        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>What is the square root of 256?</h3>
                <button class="incorrect">12</button>
                <button class="incorrect">13</button>
                <button class="incorrect">14</button>
                <button class="incorrect">15</button>
                <button class="correct"">16</button>
                <p id="message"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
            </div>
        </div>
    </body>
</html>
